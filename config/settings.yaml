# Medical Appointment Prep Assistant — Configuration
# Edit this file to configure the model backend and server settings.
# Restart the app after making changes.

model:
  # Backend: "ollama" (recommended local), "llama_cpp", "hf_transformers", or "openai_compatible"
  backend: ollama

  # --- Ollama settings ---
  # Model name as shown by `ollama list`
  # Recommended: medgemma1.5 (Google MedGemma 1.5 4B)
  name: medgemma1.5
  ollama_base_url: http://localhost:11434

  # --- llama-cpp-python settings ---
  # Uncomment and set this if using backend: llama_cpp
  # model_path: /path/to/your/model.gguf
  # n_gpu_layers: 0  # Set > 0 to offload layers to GPU (requires GPU build)

  # --- Hosted OpenAI-compatible settings (Nebius/serverless, experimental) ---
  # openai_compatible_base_url: https://your-endpoint.example.com
  # openai_compatible_api_key: set via OPENAI_COMPATIBLE_API_KEY

  # --- Shared settings ---
  context_length: 4096   # Max tokens in context window
  temperature: 0.3       # Lower = more deterministic, higher = more creative
  max_new_tokens: 2048   # Max tokens to generate per combined report

app:
  # Deployment: "local", "huggingface", or "hosted"
  deployment: local

server:
  host: 127.0.0.1  # Use 0.0.0.0 to allow LAN access
  port: 7860
